title: Raspipool
views:
  - badges:
      - sensor.outdoor_temperature
      - sensor.e_fc
      - sensor.cycle_pool
      - binary_sensor.flowd
    title: Piscine
    panel: false
    icon: 'mdi:pool'
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - max: 35
                min: 15
                theme: Backend-selected
                entity: sensor.pool_water_temperature
                severity:
                  green: 27
                  red: 33
                  yellow: 31
                name: temp
                type: gauge
              - max: 8
                min: 6.5
                theme: Backend-selected
                entity: sensor.ph_mean
                severity:
                  green: 6.95
                  red: 7.75
                  yellow: 7.35
                name: ph
                type: gauge
              - max: 1999
                min: -1999
                theme: Backend-selected
                entity: sensor.orp_mean
                severity:
                  green: 650
                  red: 800
                  yellow: 600
                name: orp
                type: gauge
          - show_name: false
            entities:
              - entity: sensor.ezo_temperature
                hold_action:
                  action: call-service
                  service: homeassistant.update_entity
                  service_data:
                    entity_id: sensor.ezo_temperature
              - entity: sensor.ezo_ph
                hold_action:
                  action: call-service
                  service: homeassistant.update_entity
                  service_data:
                    entity_id: sensor.ezo_ph
              - entity: sensor.ezo_orp
                hold_action:
                  action: call-service
                  service: homeassistant.update_entity
                  service_data:
                    entity_id: sensor.ezo_orp
            type: glance
            show_state: true
          - title: Fournitures
            type: horizontal-stack
            cards:
              - max: 20
                min: 0
                theme: default
                entity: sensor.remain_cycles
                severity:
                  green: 15
                  red: 5
                  yellow: 10
                name: cycles restants
                type: gauge
              - max: 10
                min: 0
                theme: default
                entity: sensor.muriatic_tank
                severity:
                  green: 5
                  red: 1
                  yellow: 3
                type: gauge
          - show_name: true
            entities:
              - entity: switch.pump
                hold_action:
                  action: toggle
              - entity: switch.turbo
                name: Robot
                hold_action:
                  action: toggle
              - entity: binary_sensor.muriatic
                hold_action:
                  action: call-service
                  service: switch.toggle
                  service_data:
                    entity_id: switch.ph
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/2
              - entity: binary_sensor.bleach
                hold_action:
                  action: call-service
                  service: switch.toggle
                  service_data:
                    entity_id: switch.orp
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/2
            type: glance
            show_state: false
            show_icon: true
  - badges: []
    title: Historique
    panel: true
    icon: 'mdi:chart-line'
    cards:
      - type: horizontal-stack
        cards:
          - title: 3 dernières heures
            entities:
              - entity: sensor.pump_state
              - entity: switch.orp
                name: Électrolyseur
              - entity: switch.ph
                name: Acide
              - entity: sensor.ph_mean
                name: pH
              - entity: sensor.orp_mean
                name: ORP
              - entity: sensor.pool_water_temperature
                name: temp. eau
            type: history-graph
            hours_to_show: 3
          - title: 3 derniers jours
            entities:
              - entity: sensor.pump_state
              - entity: switch.orp
                name: Électrolyseur
              - entity: switch.ph
                name: Acide
              - entity: sensor.ph_mean
                name: pH
              - entity: sensor.orp_mean
                name: ORP
              - entity: sensor.pool_water_temperature
                name: temp. eau
            type: history-graph
            hours_to_show: 72
  - badges: []
    title: Chimie
    panel: true
    icon: 'mdi:flask'
    cards:
      - type: horizontal-stack
        cards:
          - entities:
              - label: Acide ( - pH )
                type: section
              - entity: input_number.muriatic_tank
                name: Niveau cuve
              - entity: input_number.muriatic_concentration
                name: Concentration
              - entity: input_number.muriatic_speed
                name: Débit injection
              - entity: switch.ph
                name: Pompe injection
                secondary_info: last-changed
              - entity: input_boolean.lock_muriatic
                name: Verrouiller pompe
            type: entities
            show_header_toggle: false
          - entities:
              - label: Électrolyseur au sel (ORP)
                type: section
              - entity: input_number.bleach_concentration
                name: Rendement cellule (%)
              - entity: input_number.bleach_speed
                name: Débit de génération (g/h)
              - entity: sensor.duree_marche_cellule
                name: Durée de marche (prochaine)
              - entity: switch.orp
                name: Cellule (ON/OFF)
                secondary_info: last-changed
              - entity: input_boolean.lock_bleach
                name: Verrouiller électrolyseur
            type: entities
            show_header_toggle: false
  - badges: []
    path: default_view
    icon: 'mdi:message-alert'
    title: Alertes
    cards:
      - title: Notifications
        entities:
          - entity: input_number.notify_cycles
          - entity: input_boolean.notify_seasson
          - entity: input_number.notify_muriatic_high
          - entity: input_number.notify_muriatic_tank
          - entity: input_number.notify_bleach_high
        type: entities
        show_header_toggle: true
  - badges: []
    title: Réglages
    icon: 'mdi:tune'
    cards:
      - title: Réglages piscine
        entities:
          - label: Piscine
            type: section
          - entity: input_number.capacity
            name: Capacité
          - entity: input_number.quality
            name: Qualité
          - entity: input_datetime.recirculation
            name: Renouvellement
          - entity: input_boolean.turbo
            name: Robot de nettoyage
          - entity: input_number.turbo
            name: "% du cycle avec robot"
          - label: Filtre
            type: section
          - entity: input_datetime.cycle_start
            name: Heure 1er cycle
          - entity: input_datetime.second_cycle_start
            name: Heure 2ᵉ cycle
          - entity: input_number.second_cycle
          - entity: sensor.cycle_pool
          - entity: input_number.cycle
        type: entities
        show_header_toggle: false
        theme: default
      - title: Réglages chimie
        entities:
          - label: Désinfection (électrolyseur au sel)
            type: section
          - entity: input_number.fc_target
            name: Cible désinfection (ppm)
          - entity: sensor.e_fc
            name: Désinfection actuelle (ppm)
          - entity: input_number.bleach_inject
            name: Quantité à produire (g)
          - entity: sensor.duree_marche_cellule
            name: Durée marche cellule (min)
          - entity: input_number.e_fc_adjust
            name: Ajustement ±% désinfection
          - label: pH
            type: section
          - entity: input_number.ph_target
            name: Cible pH
          - entity: sensor.ph_mean
            name: pH actuel
          - entity: input_number.muriatic_inject
            name: Prochaine injection acide (ml)
        type: entities
        show_header_toggle: false
  - badges:
      - sun.sun
      - sensor.time
      - sensor.cycle_pool
      - input_number.out_of_order
    title: Avancé
    path: advanced
    icon: mdi:hammer-wrench
    cards:
      - type: markdown
        content: |
          **Maintenance & cumuls** — Compteur de maintenance, réinitialisation du cumul de filtration, et lancement manuel de la pompe.
      - type: horizontal-stack
        cards:
          - type: button
            entity: input_number.out_of_order
            name: Jours depuis maintenance
            tap_action:
              action: none
            hold_action:
              action: more-info
          - type: button
            entity: input_datetime.cummulated_flow_start
            name: Réinitialiser le cumul
            tap_action:
              action: more-info
            hold_action:
              action: call-service
              service: automation.trigger
              service_data:
                entity_id: automation.reset_cummulated_flow_start
          - type: button
            entity: input_number.pump_on_for
            name: Filtrer pendant (durée)
            tap_action:
              action: none
            hold_action:
              action: more-info
      - type: entities
        title: Cumul de filtration (depuis la date de début)
        entities:
          - entity: input_datetime.cummulated_flow_start
            name: Début du cumul
          - entity: sensor.cummulated_flow_low
            name: Temps filtration (pompe seule)
          - entity: sensor.cummulated_flow_high
            name: Temps robot
        show_header_toggle: false
  - badges: []
    title: Simulation
    icon: 'mdi:flask-outline'
    cards:
      - type: entities
        title: Mode simulation
        entities:
          - entity: input_boolean.simulation_mode
          - entity: input_number.sim_temperature
          - entity: input_number.sim_ph
          - entity: input_number.sim_orp
          - entity: input_number.sim_outdoor_temperature
          - entity: input_number.sim_power_consumption
          - entity: input_number.sim_power_production
          - entity: input_boolean.sim_pump
          - entity: input_boolean.sim_turbo
            name: Sim Robot
          - entity: input_boolean.sim_ph_pump
          - entity: input_boolean.sim_orp_pump
          - entity: input_boolean.sim_flowd

