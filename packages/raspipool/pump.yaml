template:
  - sensor:
      - name: "Cycle pool"
        unique_id: raspipool_cycle_pool
        state: >-
          {% set ezo_temp = states('sensor.ezo_temperature') %}
          {% if ezo_temp in ['unknown', 'unavailable', 'none'] %}
            {% set temp = states('sensor.pool_water_temperature') | float(0) %}
          {%- else -%}
            {% set temp = ezo_temp | float(0) %}
          {%- endif -%}
          {{ (state_attr('input_datetime.recirculation', 'timestamp') | float(0) *
            (1 - is_state('input_boolean.turbo', 'on') | int * states('input_number.turbo') | float(0) * 2 / 300) *
            (temp / [1, (9 - temp / 2)] | max) /
            (states('input_number.quality') | float(0) + 6)) | round(0) | timestamp_custom('%H:%M', false) }}
        icon: >-
          {% set cycle = states('input_number.cycle') | int(0) %}
          {% if cycle < 0 %}
            mdi:water-off
          {% elif cycle < 240 %}
            mdi:weather-snowy
          {% elif cycle >= 1440 %}
            mdi:numeric-{{ (cycle / 1440) | int }}-box-multiple-outline
          {% else %}
            mdi:weather-sunny
          {% endif %}
#      surpressor:
#        name: "Surpressor"
#        state: "{{ states('input_number.surpressor') | round(0) }}"
      - name: "Net power"
        unique_id: raspipool_net_power
        state: >-
          {% if is_state('input_boolean.simulation_mode', 'on') %}
            {{ states('input_number.sim_power_consumption') | float(0) -
               states('input_number.sim_power_production') | float(0) }}
          {% else %}
            {{ states('sensor.envoy_122301074544_consommation_electrique_actuelle') | float(0) -
               states('sensor.envoy_122301074544_production_d_electricite_actuelle') | float(0) }}
          {% endif %}
      - name: "Time salt max"
        unique_id: raspipool_time_salt_max
        state: >-
          {% set tsaltmax = ((states('sensor.pool_water_temperature') | float(0) - 14) * 12 * 4 + 47.6) | int %}
          {{ 0 if tsaltmax < 0 else tsaltmax }}
  - binary_sensor:
      - name: "Power excess"
        unique_id: raspipool_power_excess
        state: "{{ states('sensor.net_power_mean') | float(0) < -1.2 }}"
        delay_on:
          minutes: 10
      - name: "Power shortage"
        unique_id: raspipool_power_shortage
        state: "{{ states('sensor.net_power_mean') | float(0) > 0 }}"
        delay_on:
          minutes: 5

sensor:
  - platform: statistics
    name: net_power_mean
    unique_id: raspipool_net_power_mean
    entity_id: sensor.net_power
    state_characteristic: mean
    max_age:
      minutes: 20
    precision: 2


input_number:
  out_of_order:
    min: -180
    max: 10
    unit_of_measurement: 'days'
    icon: mdi:engine-off
  cycle:
    min: -10
    max: 14400
    unit_of_measurement: 'minutes'
    mode: box
  second_cycle:
    min: 0
    max: 50
    step: 5
    unit_of_measurement: '%'
    icon: mdi:replay
  pump_on_for:
    min: 0
    max: 24
    step: 0.25
    unit_of_measurement: 'hours'
    icon: mdi:engine


automation:
- alias: cycle_start
  id: '1559137717424'
  initial_state: true
  trigger:
  - platform: time
    at: input_datetime.cycle_start
  condition: []
  action:
  - service: counter.reset
    entity_id: counter.minutes_fonctionnement
  - service: input_number.set_value
    data:
      entity_id: input_number.out_of_order
      value: "{{ states('input_number.out_of_order') | int(0) - 1 }}"
  - condition: numeric_state
    entity_id: input_number.out_of_order
    below: 0
#  - service: input_number.set_value
#    data_template:
#      entity_id: input_number.cycle
#      value: "{% set lmins = states('input_number.cycle')|int %} {%- if lmins <
#        0 -%} {{ lmins + 1 }} {%- else -%} {% set mins = strptime(states('sensor.cycle_pool'),'%H:%M').hour
#        * 60 + strptime(states('sensor.cycle_pool'),'%H:%M').minute %} {%- if
#        lmins < 240 -%} {{ mins + lmins }} {%- elif lmins < 1440 -%} {{ mins }} {%- else -%} {{ lmins }} {%- endif -%} 
#{%- endif -%}"
  - condition: numeric_state
    entity_id: input_number.cycle
    above: 0
  - service: automation.trigger
    entity_id: automation.cycle_pump_start
  - service: input_number.set_value
    data:
      entity_id: input_number.cycle
      value: "{% set lmins = states('input_number.cycle')|int(0) %} {%- if lmins <
        0 -%} {{ lmins + 1 }} {%- else -%} {% set mins = strptime(states('sensor.cycle_pool'),'%H:%M').hour
        * 60 + strptime(states('sensor.cycle_pool'),'%H:%M').minute %} {%- if
        lmins < 60 -%} {{ mins + lmins }} {%- elif lmins < 1440 -%} {{ mins }} {%- else -%} {{ lmins }} {%- endif -%} 
{%- endif -%}"
  - condition: numeric_state
    entity_id: input_number.cycle
    below: 1440
  - delay: 00:00:10
  - service: automation.trigger
    entity_id: automation.cycle_turbo_start

- alias: cycle_pump_start
  id: '1559293900608'
  trigger: []
  condition: []
  action:
  - entity_id: switch.pump
    service: switch.turn_on
  - entity_id: automation.ph_bad
    service: automation.turn_on
  - entity_id: automation.orp_bad
    service: automation.turn_on
  - delay: 00:10:00
  - service: automation.trigger
    entity_id: automation.muriatic_set
  - delay: 00:00:10
  - service: automation.trigger
    entity_id: automation.muriatic_inject
  - delay: 00:05:00
  - service: automation.trigger
    entity_id: automation.bleach_set
  - delay: 00:00:10
  - service: automation.trigger
    entity_id: automation.bleach_inject
  - delay: 00:{{ [0,
      [1440 , (states('input_number.cycle')|int * (1 - states('input_number.second_cycle')|int/100))|int]|min-
      [0 , states('input_number.muriatic_inject')|float/ states('input_number.muriatic_speed')|float ]|max|int-
      15-
      [[0 , (60 * states('input_number.bleach_inject')|float / states('input_number.bleach_speed')|float)|round(0)|int]|max, states('sensor.time_salt_max')|int]|min|int
      ]|max|int }}:00
  - entity_id: switch.pump
    service: switch.turn_off
  - condition: numeric_state
    entity_id: input_number.cycle
    above: 1439
  - service: input_number.set_value
    data:
      entity_id: input_number.cycle
      value: "{{ states('input_number.cycle') | int(0) - 1440 }}"

- alias: cycle_pump_second_start
  id: '20260220120000'
  initial_state: true
  trigger:
  - platform: time
    at: input_datetime.second_cycle_start
  condition:
  - condition: numeric_state
    entity_id: input_number.second_cycle
    above: 0
  - condition: state
    entity_id: switch.pump
    state: 'off'
  - condition: template
    value_template: >-
      {% set start = state_attr('input_datetime.cycle_start', 'timestamp') | float(0) %}
      {% set minutes = states('input_number.cycle') | float(0) * (1 - states('input_number.second_cycle') | float(0) / 100) %}
      {% set finished = start + (minutes * 60) %}
      {{ as_timestamp(now()) | float(0) >= finished }}
  action:
  - entity_id: switch.pump
    service: switch.turn_on
  - delay: 00:{{ (states('input_number.cycle')|int * states('input_number.second_cycle')|int / 100)|int }}:00
  - entity_id: switch.pump
    service: switch.turn_off

# Démarre le robot de nettoyage pendant X % du cycle de filtration (switch.turbo = robot)
- alias: cycle_turbo_start
  id: '1559223936600'
  trigger: []
  condition: []
  action:
  - condition: state
    entity_id: input_boolean.turbo
    state: 'on'
  - condition: numeric_state
    entity_id: input_number.turbo
    above: 0
  - entity_id: switch.turbo
    service: switch.turn_off
  - delay: 00:{{ (states('input_number.cycle')|int * (1 - states('input_number.second_cycle')|int/100) * (1 - states('input_number.turbo')|int /100) /2 )|int }}:00
  - entity_id: switch.turbo
    service: switch.turn_on
  - delay: 00:{{ (states('input_number.cycle')|int * (1 - states('input_number.second_cycle')|int/100) * states('input_number.turbo')|int /100 )|int }}:00
  - entity_id: switch.turbo
    service: switch.turn_off
  initial_state: true

- alias: pump_start
  id: '1559049859754'
  initial_state: true
  trigger:
  - platform: state
    entity_id: binary_sensor.power_excess
    to: 'on'
  - platform: state
    entity_id: binary_sensor.power_shortage
    to: 'on'
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: binary_sensor.power_excess
        state: 'on'
      - condition: state
        entity_id: switch.pump
        state: 'on'
      - condition: state
        entity_id: switch.turbo
        state: 'off'
      - condition: numeric_state
        entity_id: counter.minutes_fonctionnement
        below: 46
      sequence:
      - service: switch.turn_on
        entity_id: switch.turbo
    - conditions:
      - condition: state
        entity_id: binary_sensor.power_shortage
        state: 'on'
      - condition: state
        entity_id: switch.turbo
        state: 'on'
      sequence:
      - service: switch.turn_off
        entity_id: switch.turbo
    - conditions:
      - condition: state
        entity_id: switch.turbo
        state: 'on'
      - condition: numeric_state
        entity_id: counter.minutes_fonctionnement
        above: 45
      sequence:
      - service: switch.turn_off
        entity_id: switch.turbo

        
# À l'arrêt de la pompe : coupe aussi le robot (et les pompes pH/ORP)
- alias: pump_stop
  id: '1559449855764'
  initial_state: true
  trigger:
  - platform: state
    entity_id: switch.pump
    to: 'off'
  condition: []
  action:
  - service: switch.turn_off
    entity_id: switch.turbo
  - service: switch.turn_off
    entity_id: switch.ph
  - service: switch.turn_off
    entity_id: switch.orp

- alias: every_2_min
  id: '1554168816425'
  initial_state: true
  trigger:
  - platform: time_pattern
    minutes: '/2'
  condition:
  - condition: state
    entity_id: switch.pump
    state: 'on'
    for:
      minutes: 5
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.simulation_mode
        state: 'on'
      sequence: []
    default:
      - service: homeassistant.update_entity
        target:
          entity_id:
            - sensor.ezo_hw_ph
            - sensor.ezo_hw_temperature
            - sensor.ezo_hw_orp

- alias: 'every_5_min'
  id: 'surpressorcount'
  initial_state: true  
  trigger:
  - platform: time_pattern
    minutes: '/5'  # Déclenche toutes les minutes
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: switch.turbo
        state: 'on'  # S'assure que le surpresseur est en marche
      - condition: numeric_state
        entity_id: counter.minutes_fonctionnement
        below: 46
      sequence:
      - service: counter.increment
        entity_id: counter.minutes_fonctionnement
    - conditions:
      - condition: numeric_state
        entity_id: counter.minutes_fonctionnement
        above: 45
      sequence:
      - service: automation.trigger
        entity_id: automation.pump_start


- alias: pump_on_for
  id: '1549429855765'
  initial_state: true
  trigger:
  - platform: numeric_state
    entity_id: input_number.pump_on_for
    above: 0
  condition: []
  action:
  - service: switch.turn_on
    entity_id: switch.pump
  - delay: "{{ states('input_number.pump_on_for') | int(0) }}:{{ ((states('input_number.pump_on_for') | float(0) % 1) * 60) | int(0) }}:0"
  - service: switch.turn_off
    entity_id: switch.pump
  - service: input_number.set_value
    data:
      entity_id: input_number.pump_on_for
      value: '0'
