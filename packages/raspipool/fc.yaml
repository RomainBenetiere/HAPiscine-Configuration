# entity_id doit rester sensor.e_fc (dérivé du name). Renommer l'affichage dans Paramètres > Entités si besoin.
template:
  - sensor:
      - name: "E FC"
        state: >-
          {{ ( 0.23 * (1 + states('input_number.e_fc_adjust') | float(0) / 100 ) *
            (14 - states('sensor.ph_mean') | float(0)) ** (1 / (400 - states('sensor.orp_mean') | float(0))) *
            (states('sensor.ph_mean') | float(0) - 4.1) ** ((states('sensor.orp_mean') | float(0) - 516) / 145) +
            10.0 ** ((states('sensor.orp_mean') | float(0) + states('sensor.ph_mean') | float(0) * 70 - 1282) / 40)
          ) | round(1) }}
        unit_of_measurement: ppm
        icon: mdi:react

input_number:
  e_fc_adjust:
    name: "Ajustement ±% désinfection"
    min: -100
    max: 200
    unit_of_measurement: '%'
    icon: mdi:react
    mode: box
  fc_target:
    name: "Cible désinfection (ppm)"
    min: 0
    max: 30
    step: 0.1
    mode: box
    unit_of_measurement: 'ppm'
    icon: mdi:react


automation:
- alias: fc_ok
  id: '1559638825701'
  initial_state: true
  trigger:
    platform: numeric_state
    entity_id: sensor.e_fc
    above: 0.60
    below: 5.00
    for:
      minutes: 1
  condition: []
  action:
  - service: frontend.set_theme
    data:
      name: default
- alias: fc_high
  id: '1559638825702'
  initial_state: true
  trigger:
    platform: numeric_state
    entity_id: sensor.e_fc
    above: 5.01
    for:
      minutes: 1
  condition: []
  action:
  - service: frontend.set_theme
    data:
      name: danger


- alias: fc_low
  id: '1559638825703'
  initial_state: true
  trigger:
    platform: numeric_state
    entity_id: sensor.e_fc
    below: 0.59
    for:
      minutes: 1
  condition: []
  action:
  - service: frontend.set_theme
    data:
      name: algae


- alias: fc_target
  id: '1559146873657'
  initial_state: true
  trigger:
    - platform: state
      entity_id: input_number.fc_target
  condition: []
  action:
    - service: automation.trigger
      entity_id: automation.bleach_set

