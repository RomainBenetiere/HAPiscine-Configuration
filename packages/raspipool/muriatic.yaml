template:
  - sensor:
      - name: "Muriatic tank"
        state: "{{ states('input_number.muriatic_tank') | float(0) | round(2) }}"

sensor:
  - platform: history_stats
    name: muriatic_on_last_hour
    entity_id: switch.ph
    state: 'on'
    type: time
    end: '{{now().replace(minute=0).replace(second=0)}}'
    duration: 01:00:00

  - platform: history_stats
    name: muriatic_on_last_48h
    entity_id: switch.ph
    state: 'on'
    type: time
    end: '{{now()}}'
    duration: 48:00:00


input_number:
  muriatic_tank:
    min: 0
    max: 30
    step: 0.1
    unit_of_measurement: 'l'
    icon: mdi:blood-bag
  muriatic_concentration:
    min: 5
    max: 30
    step: .1
    unit_of_measurement: '%'
    icon: mdi:water-percent
    mode: box
  muriatic_speed:
    min: 10
    max: 100
    step: 1
    unit_of_measurement: 'ml/min'
    icon: mdi:needle
  notify_muriatic_high:
    min: 0
    max: 5
    step: 0.1
    unit_of_measurement: 'l/48h'
  notify_muriatic_tank:
    min: 0
    max: 5
    step: 0.5
    unit_of_measurement: 'l'
    icon: mdi:flask-empty
  muriatic_inject:
    min: 0
    max: 10000
    step: 5
    unit_of_measurement: 'ml'
    icon: mdi:beaker
    mode: box

automation:
- alias: muriatic_every_hour
  id: '1554167717425'
  initial_state: true
  trigger:
  - platform: time_pattern
    minutes: 1
  condition: []
  action:
  - service: input_number.set_value
    data:
      entity_id: input_number.muriatic_tank
      value: "{{ (states('input_number.muriatic_tank') | float(0) - (states('sensor.muriatic_on_last_hour') | float(0) * states('input_number.muriatic_speed') | int(0) * 6 / 100)) | round(2) }}"

- alias: muriatic_tank_low
  id: '1559049845419'
  initial_state: true
  trigger:
    platform: template
    value_template: "{% if states('input_number.notify_muriatic_tank') | int(0) > 0 and states('sensor.muriatic_tank') | float(0) < states('input_number.notify_muriatic_tank') | float(0) %}true{% endif %}"
  condition: []
  action:
  - service: persistent_notification.create
    data:
      title: "Cuve acide basse ({{ states('input_number.muriatic_tank') | float(0) }} L)!!!"
      message: "@{{ now().strftime('%H:%M') }}[{{ now().day }}/{{ now().month }}]"
      notification_id: "pool_muriatic_tank_low"

- alias: muriatic_high
  id: '1559049844489'
  initial_state: true
  trigger:
    platform: template
    value_template: "{% if states('input_number.notify_muriatic_high') | int(0) > 0 and states('sensor.muriatic_on_last_48h') | float(0) > (states('input_number.notify_muriatic_high') | float(0) * 100) / (states('input_number.muriatic_speed') | float(0) * 6) %}true{% endif %}"
  condition: []
  action:
  - entity_id: switch.ph
    service: switch.turn_off
  - entity_id: input_boolean.lock_muriatic
    service: input_boolean.turn_on
  - service: persistent_notification.create
    data:
      title: "Injection acide bloquée ({{ states('input_number.notify_muriatic_high') }} L/48h max)!!!"
      message: "{{ now().strftime('%H:%M') }}[{{ now().day }}/{{ now().month }}]"
      notification_id: "pool_muriatic_blocked"

- alias: muriatic_set
  id: '1559049844459'
  initial_state: true
  trigger: []
  condition: []
  action:
  - service: input_number.set_value
    data:
      entity_id: input_number.muriatic_inject
      value: "{{ (states('input_number.capacity') | float(0) * (10 ** (8 - states('input_number.ph_target') | float(0)) - 10 ** (8 - states('sensor.ph_mean') | float(0))) * (126.19 / states('input_number.muriatic_concentration') | float(0)), 0) | max | round(0) | int }}"

- alias: muriatic_inject
  id: '1559949826459'
  initial_state: true
  trigger: []
  condition: []
  action:
  - condition: state
    entity_id: input_boolean.lock_muriatic
    state: 'off'
  - condition: numeric_state
    entity_id: input_number.muriatic_inject
    value_template: "{{ states('input_number.muriatic_inject') | float(0) / states('input_number.capacity') | float(0) }}"
    above: 5.0
    below: 100.0
  - entity_id: switch.ph
    service: switch.turn_on
  - service: persistent_notification.create
    data:
      title: "Injection acide: ({{ states('input_number.muriatic_inject') }} ml)!!!"
      message: "{{ now().strftime('%H:%M') }}[{{ now().day }}/{{ now().month }}]"
      notification_id: "pool_muriatic_inject_start"
  - delay: 00:00:{{ [0, 60 * states('input_number.muriatic_inject') | float(0) / states('input_number.muriatic_speed') | float(0)] | max | int(0) }}
  - entity_id: switch.ph
    service: switch.turn_off
  - service: persistent_notification.create
    data:
      title: "Fin injection acide!!!"
      message: "{{ now().strftime('%H:%M') }}[{{ now().day }}/{{ now().month }}]"
      notification_id: "pool_muriatic_inject_end"

