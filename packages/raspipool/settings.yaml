input_datetime:
  cycle_start:
    name: Heure de démarrage cycle pompe
    has_date: false
    has_time: true
  recirculation:
    name: Cycle de recirculation
    has_time: true
    has_date: false
    icon: mdi:timer
  second_cycle_start:
    name: Heure de démarrage 2ᵉ cycle
    has_date: false
    has_time: true
    icon: mdi:clock-outline
  robot_cycle_start:
    name: Heure de démarrage robot (cycle programmé)
    has_date: false
    has_time: true
    icon: mdi:robot-vacuum


input_number:
  capacity:
    name: Capacité bassin (m³)
    min: 5
    max: 100
    unit_of_measurement: m3
    icon: mdi:water-pump
  quality:
    name: Qualité eau
    min: 0
    max: 9
    unit_of_measurement: stars
    icon: mdi:star
  turbo:
    name: "% du cycle avec robot"
    min: 0
    max: 100
    step: 5
    unit_of_measurement: '%'
    icon: mdi:robot-vacuum
  robot_solar_max_minutes:
    name: Temps max robot solaire (min)
    min: 5
    max: 180
    step: 5
    initial: 45
    unit_of_measurement: min
    icon: mdi:timer-sand
    mode: box
  javel_pump_flow:
    name: "Débit pompe Javel (mL/min)"
    min: 10
    max: 100
    step: 1
    initial: 32
    unit_of_measurement: "mL/min"
    icon: mdi:pump
    mode: box
  javel_concentration:
    name: "Concentration Javel (%)"
    min: 1
    max: 20
    step: 0.1
    initial: 9.6
    unit_of_measurement: "%"
    icon: mdi:water-percent
    mode: box
  javel_max_daily_vol:
    name: "Volume max Javel/jour (mL)"
    min: 50
    max: 2000
    step: 10
    initial: 500
    unit_of_measurement: "mL"
    icon: mdi:alert-octagon
    mode: box
  javel_max_daily_time:
    name: "Temps max Javel/jour (min)"
    min: 1
    max: 120
    step: 1
    initial: 30
    unit_of_measurement: "min"
    icon: mdi:timer-alert
    mode: box

input_select:
  pool_mode:
    name: Mode désinfection ZLT 75
    icon: mdi:pool
    options:
      - Low
      - Medium
      - High
    initial: Medium
  disinfection_mode:
    name: Mode de désinfection
    icon: mdi:swap-horizontal
    options:
      - Electrolyseur
      - Javel
      - Désactivé
    initial: Electrolyseur


input_boolean:
  turbo:
    name: "Robot de nettoyage"
    icon: mdi:robot-vacuum
  robot_demarrage_solaire:
    name: "Robot démarrage sur solaire"
    icon: mdi:solar-power
  
  factory_started:
    name: Config usine démarrée
    icon: mdi:auto-fix


automation:
- alias: factory_started
  id: '1559149839000'
  initial_state: true
  trigger:
    platform: homeassistant
    event: start
  condition: 
    condition: state 
    entity_id: input_boolean.factory_started
    state: 'off'
  action:
  - service: input_boolean.turn_on
    data:
      entity_id: input_boolean.factory_started
  - service: input_number.set_value
    data:
      entity_id: input_number.capacity
      value: 50
  - service: input_number.set_value
    data:
      entity_id: input_number.quality
      value: 4
  - service: input_number.set_value
    data:
      entity_id: input_number.bleach_concentration
      value: 100
  - service: input_number.set_value
    data:
      entity_id: input_number.bleach_speed
      value: 15
  - service: input_number.set_value
    data:
      entity_id: input_number.fc_target
      value: 1.5
  - service: input_number.set_value
    data:
      entity_id: input_number.e_fc_adjust
      value: 0
  - service: input_number.set_value
    data:
      entity_id: input_number.ph_target
      value: 7.2
  - service: input_number.set_value
    data:
      entity_id: input_number.muriatic_tank
      value: 10
  - service: input_number.set_value
    data:
      entity_id: input_number.muriatic_concentration
      value: 20
  - service: input_number.set_value
    data:
      entity_id: input_number.muriatic_speed
      value: 25
  - service: input_number.set_value
    data:
      entity_id: input_number.robot_solar_max_minutes
      value: 45
  - service: input_select.select_option
    data:
      entity_id: input_select.disinfection_mode
      option: "Electrolyseur"
  - service: input_number.set_value
    data:
      entity_id: input_number.javel_pump_flow
      value: 32
  - service: input_number.set_value
    data:
      entity_id: input_number.javel_concentration
      value: 9.6
  - service: input_number.set_value
    data:
      entity_id: input_number.javel_max_daily_vol
      value: 500
  - service: input_number.set_value
    data:
      entity_id: input_number.javel_max_daily_time
      value: 30

counter:
  minutes_fonctionnement:
    initial: 0
    step: 5
    maximum: 245  # 240 minutes + 5 pour le contrôle.

