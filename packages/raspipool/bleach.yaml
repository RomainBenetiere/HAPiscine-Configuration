# Désinfection : Électrolyseur au sel OU pompe doseuse de Javel.
# Le mode est choisi par input_select.disinfection_mode (Electrolyseur / Javel / Désactivé).
#
# Électrolyseur (switch.electrolyseur) :
#   ON/OFF. Unités = grammes de chlore (g) et g/h (ex. Zelia ZLT 75 = 15 g/h).
#   Quantité (g) = f(capacité, écart cible-actuel, rendement %).
#   Durée effective = min(60×q/r, time_salt_max).
#
# Javel (switch.javel) :
#   Pompe doseuse de chlore liquide (eau de Javel).
#   Volume (mL) = masse_chlore_g × 100 / concentration_javel_%.
#   Durée (min) = volume_mL / débit_pompe_mL_par_min.
#   Sécurité thermique (time_salt_max) NON appliquée.
#   Sécurité : volume max et temps max par 24h.

template:
  - sensor:
      # --- Capteurs Électrolyseur ---
      - name: "Duree marche cellule"
        unique_id: raspipool_cell_run_duration
        state: >-
          {% set q = states('input_number.bleach_inject') | float(0) %}
          {% set r = states('input_number.bleach_speed') | float(1) %}
          {{ (60 * q / r) | round(1) if r > 0 else 0 }}
        unit_of_measurement: min
        icon: mdi:timer-outline
      - name: "Duree marche cellule effective"
        unique_id: raspipool_cell_run_duration_effective
        state: >-
          {% set q = states('input_number.bleach_inject') | float(0) %}
          {% set r = states('input_number.bleach_speed') | float(1) %}
          {% set calc = (60 * q / r) | round(0) | int if r > 0 else 0 %}
          {% set tmax = states('sensor.time_salt_max') | int(0) %}
          {{ [calc, tmax] | min }}
        unit_of_measurement: min
        icon: mdi:timer-check
      - name: "ZLT 75 run duration"
        unique_id: raspipool_zlt_75_run_duration
        state: >-
          {% set T = states('sensor.pool_water_temperature') | float(0) %}
          {% set mode = states('input_select.pool_mode') %}
          {% set C =
              17.5 if mode == 'Low' else
              44.8 if mode == 'Medium' else
              61.1
          %}
          {% set raw = (T - 14) * C + 47.6 %}
          {{ [0, raw] | max | round(1) }}
        unit_of_measurement: min
        icon: mdi:timer-cog

      # --- Capteurs Javel ---
      - name: "Javel volume ml"
        unique_id: raspipool_javel_volume_ml
        state: >-
          {% set q = states('input_number.bleach_inject') | float(0) %}
          {% set c = states('input_number.javel_concentration') | float(9.6) %}
          {{ (q * 100 / c) | round(1) if c > 0 else 0 }}
        unit_of_measurement: mL
        icon: mdi:beaker-outline
      - name: "Javel run duration"
        unique_id: raspipool_javel_run_duration
        state: >-
          {% set vol = states('sensor.javel_volume_ml') | float(0) %}
          {% set flow = states('input_number.javel_pump_flow') | float(32) %}
          {{ (vol / flow) | round(1) if flow > 0 else 0 }}
        unit_of_measurement: min
        icon: mdi:timer-outline
      - name: "Javel vol last 24h"
        unique_id: raspipool_javel_vol_last_24h
        state: >-
          {% set hours = states('sensor.javel_on_last_24h') | float(0) %}
          {% set flow = states('input_number.javel_pump_flow') | float(32) %}
          {{ (hours * 60 * flow) | round(0) }}
        unit_of_measurement: mL
        icon: mdi:cup-water

sensor:
  - platform: history_stats
    name: bleach_on_last_hour
    unique_id: raspipool_bleach_on_last_hour
    entity_id: switch.electrolyseur
    state: 'on'
    type: time
    end: '{{now().replace(minute=0).replace(second=0)}}'
    duration: 01:00:00

  - platform: history_stats
    name: bleach_on_last_48h
    unique_id: raspipool_bleach_on_last_48h
    entity_id: switch.electrolyseur
    state: 'on'
    type: time
    end: '{{now()}}'
    duration: 48:00:00

  - platform: history_stats
    name: javel_on_last_24h
    unique_id: raspipool_javel_on_last_24h
    entity_id: switch.javel
    state: 'on'
    type: time
    end: '{{now()}}'
    duration: 24:00:00

input_number:
  bleach_concentration:
    name: "Rendement cellule (%)"
    min: 25
    max: 100
    step: 1
    initial: 100
    unit_of_measurement: '%'
    icon: mdi:water-percent
    mode: box
  bleach_speed:
    name: "Débit de génération (g/h)"
    min: 1
    max: 30
    step: 0.5
    unit_of_measurement: "g/h"
    icon: mdi:lightning-bolt
  notify_bleach_high:
    name: "Temps de marche maximal 48h (h)"
    min: 0
    max: 24
    step: 0.5
    unit_of_measurement: "h"
    icon: mdi:timer-alert
  bleach_inject:
    name: "Quantité à produire (g)"
    min: 0
    max: 2000
    step: 1
    unit_of_measurement: "g"
    icon: mdi:counter
    mode: box
  bleach_delay_effective:
    name: "Durée marche désinfection appliquée (min)"
    min: 0
    max: 1440
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-check
    mode: box


automation:
# --- Sécurité sur-chloration Électrolyseur (48h) ---
- alias: bleach_high
  id: '1559049844490'
  initial_state: true
  trigger:
    platform: template
    value_template: "{% if states('input_number.notify_bleach_high') | float(0) > 0 and states('sensor.bleach_on_last_48h') | float(0) > states('input_number.notify_bleach_high') | float(0) %}true{% endif %}"
  condition: []
  action:
  - entity_id: switch.electrolyseur
    service: switch.turn_off
  - entity_id: input_boolean.lock_bleach
    service: input_boolean.turn_on
  - service: persistent_notification.create
    data:
      title: "Cellule bloquée (limite 48h atteinte)"
      message: "{{ now().strftime('%H:%M') }} [{{ now().day }}/{{ now().month }}]"
      notification_id: "pool_electrolyzer_blocked"

# --- Sécurité sur-injection Javel (24h) ---
- alias: javel_high
  id: 'javel_high_safety'
  initial_state: true
  trigger:
    platform: template
    value_template: >-
      {% set time_limit = states('input_number.javel_max_daily_time') | float(0) %}
      {% set vol_limit = states('input_number.javel_max_daily_vol') | float(0) %}
      {% set time_used = states('sensor.javel_on_last_24h') | float(0) * 60 %}
      {% set vol_used = states('sensor.javel_vol_last_24h') | float(0) %}
      {{ (time_limit > 0 and time_used > time_limit) or (vol_limit > 0 and vol_used > vol_limit) }}
  condition: []
  action:
  - entity_id: switch.javel
    service: switch.turn_off
  - entity_id: input_boolean.lock_javel
    service: input_boolean.turn_on
  - service: persistent_notification.create
    data:
      title: "Pompe Javel bloquée (limite 24h atteinte)"
      message: "Temps: {{ (states('sensor.javel_on_last_24h') | float(0) * 60) | round(0) }} min — Volume: {{ states('sensor.javel_vol_last_24h') | float(0) | round(0) }} mL {{ '\n' }}{{ now().strftime('%H:%M') }} [{{ now().day }}/{{ now().month }}]"
      notification_id: "pool_javel_blocked"

# --- Calcul de la quantité de chlore à produire (g) ---
# En mode Électrolyseur : ajusté par le rendement cellule (bleach_concentration).
# En mode Javel : masse de chlore pur sans ajustement de rendement.
- alias: bleach_set
  id: '1559149839459'
  initial_state: true
  trigger: []
  condition: []
  action:
  - service: input_number.set_value
    data:
      entity_id: input_number.bleach_inject
      value: >-
        {% set capacity = states('input_number.capacity') | float(0) %}
        {% set fc_target = states('input_number.fc_target') | float(0) %}
        {% set e_fc = states('sensor.e_fc') | float(0) %}
        {% set mode = states('input_select.disinfection_mode') %}
        {% if mode == 'Electrolyseur' %}
          {% set factor = 100 / states('input_number.bleach_concentration') | float(100) %}
        {% else %}
          {% set factor = 1 %}
        {% endif %}
        {{ [(capacity * (fc_target - e_fc) * factor), 0] | max | round(0) | int }}

# --- Recalcul quand le mode de désinfection change ---
- alias: disinfection_mode_changed
  id: 'disinfection_mode_changed'
  initial_state: true
  trigger:
    - platform: state
      entity_id: input_select.disinfection_mode
  condition: []
  action:
    - service: automation.trigger
      entity_id: automation.bleach_set

# --- Injection de désinfectant (routage selon le mode) ---
- alias: bleach_inject
  id: '1559149426435'
  initial_state: true
  trigger: []
  condition: []
  action:
  - choose:
    # === Mode Électrolyseur ===
    - conditions:
      - condition: state
        entity_id: input_select.disinfection_mode
        state: "Electrolyseur"
      sequence:
      - condition: state
        entity_id: input_boolean.lock_bleach
        state: 'off'
      - condition: numeric_state
        entity_id: input_number.bleach_inject
        value_template: "{{ states('input_number.bleach_inject') | float(0) / states('input_number.capacity') | float(1) }}"
        above: 0.1
        below: 15.0
      - entity_id: switch.electrolyseur
        service: switch.turn_on
      - service: input_number.set_value
        data:
          entity_id: input_number.bleach_delay_effective
          value: "{{ states('sensor.duree_marche_cellule_effective') | int(0) }}"
      - service: persistent_notification.create
        data:
          title: "Cellule en marche ({{ [[0, (60 * states('input_number.bleach_inject') | float(0) / states('input_number.bleach_speed') | float(1)) | round(0)] | max, states('sensor.time_salt_max') | int(0)] | min | int(0) }} min)"
          message: "{{ now().strftime('%H:%M') }} [{{ now().day }}/{{ now().month }}]"
          notification_id: "pool_electrolyzer_start"
      - delay: 00:{{ states('input_number.bleach_delay_effective') | int(0) }}:00
      - entity_id: switch.electrolyseur
        service: switch.turn_off
      - service: persistent_notification.create
        data:
          title: "Fin marche cellule"
          message: "{{ now().strftime('%H:%M') }} [{{ now().day }}/{{ now().month }}]"
          notification_id: "pool_electrolyzer_end"

    # === Mode Javel ===
    - conditions:
      - condition: state
        entity_id: input_select.disinfection_mode
        state: "Javel"
      sequence:
      - condition: state
        entity_id: input_boolean.lock_javel
        state: 'off'
      - condition: numeric_state
        entity_id: input_number.bleach_inject
        value_template: "{{ states('input_number.bleach_inject') | float(0) / states('input_number.capacity') | float(1) }}"
        above: 0.1
        below: 15.0
      # Sécurité : volume projeté sur 24h ne dépasse pas le max
      - condition: template
        value_template: >-
          {{ (states('sensor.javel_vol_last_24h') | float(0) + states('sensor.javel_volume_ml') | float(0))
             < states('input_number.javel_max_daily_vol') | float(500) }}
      # Sécurité : temps projeté sur 24h ne dépasse pas le max
      - condition: template
        value_template: >-
          {{ (states('sensor.javel_on_last_24h') | float(0) * 60 + states('sensor.javel_run_duration') | float(0))
             < states('input_number.javel_max_daily_time') | float(30) }}
      - entity_id: switch.javel
        service: switch.turn_on
      - service: input_number.set_value
        data:
          entity_id: input_number.bleach_delay_effective
          value: "{{ states('sensor.javel_run_duration') | float(0) | round(0) | int }}"
      - service: persistent_notification.create
        data:
          title: "Injection Javel ({{ states('sensor.javel_run_duration') | float(0) | round(0) | int }} min — {{ states('sensor.javel_volume_ml') | float(0) | round(0) | int }} mL)"
          message: "{{ now().strftime('%H:%M') }} [{{ now().day }}/{{ now().month }}]"
          notification_id: "pool_javel_start"
      - delay: 00:{{ states('input_number.bleach_delay_effective') | int(0) }}:00
      - entity_id: switch.javel
        service: switch.turn_off
      - service: persistent_notification.create
        data:
          title: "Fin injection Javel"
          message: "{{ now().strftime('%H:%M') }} [{{ now().day }}/{{ now().month }}]"
          notification_id: "pool_javel_end"
    # === Mode Désactivé : rien à faire ===


